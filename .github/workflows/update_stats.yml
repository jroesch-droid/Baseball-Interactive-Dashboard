name: Update Padres Dashboard Data

on:
  schedule:
    # GitHub Actions cron runs in UTC only.
    # 11:30 PM Pacific Daylight Time (UTC-7) = 06:30 UTC next day.
    - cron: "30 6 * * *"
    # 11:30 PM PST (winter) = 07:30 UTC — uncomment in November:
    # - cron: "30 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: padres-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        # IMPORTANT: the checkout brings the previously committed
        # padres_live_data.json into the workspace — that file IS the
        # "last known good" store the pipeline falls back to when a
        # fetch fails. It also brings salaries.json / stuffplus.csv,
        # the committed primary sources for salary and Stuff+ data.
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the data pipeline
        run: python update_padres_stats.py

      - name: Commit and push refreshed JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add padres_live_data.json
          if git diff --cached --quiet; then
            echo "No data changes tonight — nothing to commit."
          else
            git commit -m "chore(data): nightly Padres stats refresh $(date -u +'%Y-%m-%d')"
            git push
          fi
