name: Update Padres Dashboard Data

on:
  schedule:
    # GitHub Actions cron runs in UTC only.
    # 11:30 PM Pacific Daylight Time (UTC-7, mid-March to early Nov,
    # i.e. essentially the whole baseball season) = 06:30 UTC next day.
    - cron: "30 6 * * *"
    # 11:30 PM Pacific Standard Time (UTC-8, winter) = 07:30 UTC.
    # Uncomment the line below in November and comment the one above,
    # or leave both enabled and accept one extra (harmless) run per day:
    # - cron: "30 7 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button for testing

permissions:
  contents: write         # required so the job can commit the JSON back

concurrency:
  group: padres-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the data pipeline
        run: python update_padres_stats.py

      - name: Commit and push refreshed JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add padres_live_data.json
          # Only commit if the file actually changed (avoids empty-commit errors)
          if git diff --cached --quiet; then
            echo "No data changes tonight — nothing to commit."
          else
            git commit -m "chore(data): nightly Padres stats refresh $(date -u +'%Y-%m-%d')"
            git push
          fi
